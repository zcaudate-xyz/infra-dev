name: Build RT Basic Images

on:
  workflow_dispatch:
  repository_dispatch:
    types: [rt-basic-changed]
  schedule:
    # Rebuild weekly to keep base image updates current
    - cron: '0 3 * * 0'

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        lang: [erlang, js, julia, lua, perl, php, python, r, ruby]

    steps:
      - name: Checkout foundation-base
        uses: actions/checkout@v3
        with:
          repository: zcaudate-xyz/foundation-base
          token: ${{ secrets.GH_TOKEN }}
          path: foundation-base

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v2

      - name: Log into GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ secrets.GH_USER }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Extract metadata for rt-basic-${{ matrix.lang }}
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ghcr.io/zcaudate-xyz/foundation-base/rt-basic-${{ matrix.lang }}

      - name: Build and push rt-basic-${{ matrix.lang }}
        uses: docker/build-push-action@v3
        with:
          context: ./foundation-base/docker/rt.basic/${{ matrix.lang }}
          file: ./foundation-base/docker/rt.basic/${{ matrix.lang }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/zcaudate-xyz/foundation-base/rt-basic-${{ matrix.lang }}:latest
          labels: ${{ steps.meta.outputs.labels }}
