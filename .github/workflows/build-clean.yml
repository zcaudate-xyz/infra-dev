name: Probe Xtbench Visibility API

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-xtbench-ci.yml'
      - 'infra/Dockerfile_foundation_xtbench_ci'
      - 'Makefile'
      - 'README.md'
  repository_dispatch:
    types: [infra-clean-main-changed]
  workflow_dispatch:

jobs:
  probe-xtbench-visibility:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Get dart package metadata
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh api /orgs/zcaudate-xyz/packages/container/infra-foundation-xtbench-dart | jq '{name, visibility, package_type, url, html_url}'

      - name: Probe visibility endpoint with GH secret token
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          code=$(curl -sS -o /tmp/gh-secret.out -w '%{http_code}' \
            -X PATCH \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/orgs/zcaudate-xyz/packages/container/infra-foundation-xtbench-dart/visibility \
            -d '{"visibility":"public"}')
          echo "gh_secret_status=${code}"
          cat /tmp/gh-secret.out

      - name: Probe package root PATCH with GH secret token
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          code=$(curl -sS -o /tmp/gh-secret-root.out -w '%{http_code}' \
            -X PATCH \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/orgs/zcaudate-xyz/packages/container/infra-foundation-xtbench-dart \
            -d '{"visibility":"public"}')
          echo "gh_secret_root_status=${code}"
          cat /tmp/gh-secret-root.out

      - name: Probe visibility endpoint with github token
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          code=$(curl -sS -o /tmp/github-token.out -w '%{http_code}' \
            -X PATCH \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/orgs/zcaudate-xyz/packages/container/infra-foundation-xtbench-dart/visibility \
            -d '{"visibility":"public"}')
          echo "github_token_status=${code}"
          cat /tmp/github-token.out

      - name: Probe package root PATCH with github token
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          code=$(curl -sS -o /tmp/github-token-root.out -w '%{http_code}' \
            -X PATCH \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/orgs/zcaudate-xyz/packages/container/infra-foundation-xtbench-dart \
            -d '{"visibility":"public"}')
          echo "github_token_root_status=${code}"
          cat /tmp/github-token-root.out
