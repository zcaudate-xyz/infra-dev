name: Diagnose Xtbench Packages

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-xtbench-ci.yml'
      - 'infra/Dockerfile_foundation_xtbench_ci'
      - 'Makefile'
      - 'README.md'
  repository_dispatch:
    types: [infra-clean-main-changed]
  workflow_dispatch:

jobs:
  diagnose-xtbench-packages:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: List org xtbench packages
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh api /orgs/zcaudate-xyz/packages?package_type=container --paginate \
            | jq '[.[] | select(.name | contains("xtbench")) | {name, visibility, package_type, html_url}]'

      - name: List user xtbench packages
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh api /user/packages?package_type=container --paginate \
            | jq '[.[] | select(.name | contains("xtbench")) | {name, visibility, package_type, html_url}]'
